app-id: org.example.ESP32_BLE_Gamepad_Manager
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: ESP32_BLE_Gamepad_Manager
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all
  - --filesystem=/run/udev:ro
modules:
  - name: ESP32_BLE_Gamepad_Manager
    buildsystem: cmake-ninja
    sources:
      - type: dir
        path: .
